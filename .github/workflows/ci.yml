name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Tests and lint
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest

      - name: Run lint
        run: uv run ruff check .

      - name: Build package
        run: uv run python -m build

      - name: Check package metadata
        run: uv run twine check dist/*

      - name: CLI smoke tests
        run: |
          uv run mlx-forge --help
          uv run mlx-forge llm --help
          uv run mlx-forge stt --help
          uv run mlx-forge tts --help

      - name: Config smoke test
        run: |
          config_home="$(mktemp -d)"
          MLX_FORGE_CONFIG_HOME="$config_home" uv run mlx-forge config set llm.default local-llm
          test "$(MLX_FORGE_CONFIG_HOME="$config_home" uv run mlx-forge config get llm.default)" = "local-llm"
          MLX_FORGE_CONFIG_HOME="$config_home" uv run mlx-forge config list
